name: Firmware Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PICOTOOL_RELEASE: v2.2.0-3
      PICOTOOL_VERSION: 2.2.0-a4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            gcc-arm-none-eabi \
            libusb-1.0-0 \
            libnewlib-arm-none-eabi

      - name: Install picotool
        run: |
          curl -L "https://github.com/raspberrypi/pico-sdk-tools/releases/download/${PICOTOOL_RELEASE}/picotool-${PICOTOOL_VERSION}-x86_64-lin.tar.gz" -o /tmp/picotool.tar.gz
          mkdir -p "$HOME/picotool"
          tar -xzf /tmp/picotool.tar.gz -C "$HOME/picotool"
          echo "$HOME/picotool/picotool" >> "$GITHUB_PATH"
          "$HOME/picotool/picotool/picotool" version

      - name: Build firmware
        working-directory: src
        run: make app

      - name: Package firmware artifacts
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/firmware"
          mkdir -p "$ARTIFACT_DIR"
          cp src/uGB.bin "$ARTIFACT_DIR/uGB.bin"
          cp src/uGB "$ARTIFACT_DIR/uGB.elf"
          picotool uf2 convert "$ARTIFACT_DIR/uGB.elf" "$ARTIFACT_DIR/uGB.uf2" --family rp2350-arm-s --abs-block

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ${{ runner.temp }}/firmware/uGB.bin
            ${{ runner.temp }}/firmware/uGB.uf2
