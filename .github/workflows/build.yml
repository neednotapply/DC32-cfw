name: Firmware Build

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            ninja-build

      - name: Build firmware with CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DPICO_BOARD=defcon32_badge
          cmake --build build

      - name: Build firmware
        working-directory: src
        run: make clean app sdcard

      - name: Package firmware artifacts
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/firmware"
          mkdir -p "$ARTIFACT_DIR"
          cp src/FIRMWARE.BIN "$ARTIFACT_DIR/FIRMWARE.BIN"
          python3 tools/bin_to_uf2.py \
            src/DC32-cfw.bin \
            "$ARTIFACT_DIR/DC32-cfw.uf2" \
            --base 0x10000000 \
            --family rp2350-arm-s \
            --abs-block
          cmp src/DC32-cfw.uf2 "$ARTIFACT_DIR/DC32-cfw.uf2"
          python3 tools/verify_uf2.py "$ARTIFACT_DIR/DC32-cfw.uf2" --input-bin src/DC32-cfw.bin
          sha256sum "$ARTIFACT_DIR/DC32-cfw.uf2" "$ARTIFACT_DIR/FIRMWARE.BIN" > "$ARTIFACT_DIR/SHA256SUMS"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            ${{ runner.temp }}/firmware/DC32-cfw.uf2
            ${{ runner.temp }}/firmware/FIRMWARE.BIN
            ${{ runner.temp }}/firmware/SHA256SUMS

      - name: Attach firmware to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/firmware/DC32-cfw.uf2
            ${{ runner.temp }}/firmware/FIRMWARE.BIN
            ${{ runner.temp }}/firmware/SHA256SUMS
          overwrite_files: true
