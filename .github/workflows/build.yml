name: Firmware Build

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            ninja-build

      - name: Build firmware with CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DPICO_BOARD=defcon32_badge
          cmake --build build

      - name: Stage DC32-cfw UF2
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/DC32-cfw"
          mkdir -p "$ARTIFACT_DIR"
          cp build/DC32-cfw.uf2 "$ARTIFACT_DIR/DC32-cfw.uf2"

      - name: Resolve SD-assets.zip source manifest
        id: sd-assets-sources
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/DC32-cfw"
          mkdir -p "$ARTIFACT_DIR"
          python3 tools/build_sd_zip.py \
            --sources-only \
            --sources-output "$ARTIFACT_DIR/SD-assets.sources.json"
          echo "cache_key=$(sha256sum "$ARTIFACT_DIR/SD-assets.sources.json" | cut -d ' ' -f 1)" >> "$GITHUB_OUTPUT"

      - name: Restore cached SD-assets.zip
        id: sd-assets-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/DC32-cfw/SD-assets.zip
          key: sd-assets-zip-${{ steps.sd-assets-sources.outputs.cache_key }}

      - name: Build SD-assets.zip
        if: steps.sd-assets-cache.outputs.cache-hit != 'true'
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/DC32-cfw"
          python3 tools/build_sd_zip.py \
            --assets-output "$ARTIFACT_DIR/SD-assets.zip" \
            --work-dir "$RUNNER_TEMP/sd-zip" \
            --sources-output "$ARTIFACT_DIR/SD-assets.sources.json"

      - name: Build SD-apps.zip
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/DC32-cfw"
          python3 tools/build_sd_zip.py \
            --apps-output "$ARTIFACT_DIR/SD-apps.zip" \
            --apps-dir build/apps \
            --work-dir "$RUNNER_TEMP/sd-apps-zip" \
            --apps-sources-output "$ARTIFACT_DIR/SD-apps.sources.json"

      - name: Upload DC32-cfw UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: DC32-cfw-uf2
          path: ${{ runner.temp }}/DC32-cfw/DC32-cfw.uf2

      - name: Upload DC32-cfw SD assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: DC32-cfw-sd-assets
          path: ${{ runner.temp }}/DC32-cfw/SD-assets.zip

      - name: Upload DC32-cfw SD apps artifact
        uses: actions/upload-artifact@v4
        with:
          name: DC32-cfw-sd-apps
          path: ${{ runner.temp }}/DC32-cfw/SD-apps.zip

      - name: Attach DC32-cfw files to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/DC32-cfw/DC32-cfw.uf2
            ${{ runner.temp }}/DC32-cfw/SD-assets.zip
            ${{ runner.temp }}/DC32-cfw/SD-apps.zip
          overwrite_files: true

      - name: Remove legacy SD bundle and source manifests from release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          gh release delete-asset "$RELEASE_TAG" SD.zip --yes >/dev/null 2>&1 || true
          gh release delete-asset "$RELEASE_TAG" SD-assets.sources.json --yes >/dev/null 2>&1 || true
          gh release delete-asset "$RELEASE_TAG" SD-apps.sources.json --yes >/dev/null 2>&1 || true
