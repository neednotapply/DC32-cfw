name: Firmware Build

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            ninja-build

      - name: Build firmware with CMake
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=cmake/arm-none-eabi.cmake \
            -DPICO_BOARD=defcon32_badge
          cmake --build build

      - name: Package DC32-cfw artifacts
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/DC32-cfw"
          mkdir -p "$ARTIFACT_DIR"
          cp build/DC32-cfw.uf2 "$ARTIFACT_DIR/DC32-cfw.uf2"
          python3 tools/build_sd_zip.py \
            --output "$ARTIFACT_DIR/SD.zip" \
            --work-dir "$RUNNER_TEMP/sd-zip"

      - name: Upload DC32-cfw artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DC32-cfw
          path: |
            ${{ runner.temp }}/DC32-cfw/DC32-cfw.uf2
            ${{ runner.temp }}/DC32-cfw/SD.zip

      - name: Attach DC32-cfw files to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ runner.temp }}/DC32-cfw/DC32-cfw.uf2
            ${{ runner.temp }}/DC32-cfw/SD.zip
          overwrite_files: true
